services:
  - type: web
    name: bukovel
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py createcachetable
    startCommand: bash scripts/start.sh
    healthCheckPath: /

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3

      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod

      - key: DEBUG
        value: false

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: bukovel-db
          property: connectionString

      # --- Cloudinary ---
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # --- Email (SMTP) ---
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: true
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@zatyshnyi-dvir.com
      - key: BOOKING_NOTIFY_EMAIL
        sync: false

databases:
  - name: bukovel-db
    plan: free
    databaseName: bukovel
    user: bukovel
