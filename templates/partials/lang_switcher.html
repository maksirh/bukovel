{% load i18n %}
{% get_current_language as CURRENT_LANG %}
<div class="lang-switcher{% if variant %} lang-switcher--{{ variant }}{% endif %}">
  <a href="{{ language_urls.uk }}"
     class="lang-switcher__btn{% if CURRENT_LANG == 'uk' %} is-active{% endif %}"
     hreflang="uk"
     rel="alternate"
     hx-boost="false"
     aria-label="Українська">UK</a>
  <a href="{{ language_urls.en }}"
     class="lang-switcher__btn{% if CURRENT_LANG == 'en' %} is-active{% endif %}"
     hreflang="en"
     rel="alternate"
     hx-boost="false"
     aria-label="English">EN</a>
</div>
